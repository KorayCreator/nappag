<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerçekçi AI Karakter Stüdyosu v4</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; background-color: #0b0c10; color: #fff;
            font-family: 'SF Pro Display', -apple-system, system-ui, sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .container {
            width: 95%; max-width: 1000px; background: #161722;
            padding: 30px; border-radius: 20px; text-align: center;
            box-shadow: 0 10px 40px rgba(0, 242, 254, 0.15); border: 1px solid #25283c;
        }
        h1 {
            color: #00f2fe; margin-bottom: 5px; font-size: 2.3rem;
            text-transform: uppercase; letter-spacing: 1px;
        }
        p { color: #8a8ab0; margin-bottom: 25px; font-size: 15px; }
        .iframe-wrapper {
            position: relative; width: 100%; height: 750px;
            border-radius: 15px; overflow: hidden;
            border: 2px solid #4facfe; background: #0d0e15;
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.2);
        }
        iframe { width: 100%; height: 100%; border: none; }
        /* Yükleniyor efekti */
        .loader {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #0d0e15; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10;
        }
        .spinner {
            border: 4px solid #161722; border-top: 4px solid #00f2fe;
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h1>Karakter Motoru v4.0 (Wav2Lip)</h1>
    <p>Aktif ve stabil yapay zeka sunucusuna bağlanıldı. Fotoğraf yükle, sesi ekle ve gerçekçi videoyu al!</p>
    
    <div class="iframe-wrapper">
        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p style="color: #00f2fe;">Yapay zeka arayüzü yükleniyor...</p>
        </div>
        
        <iframe 
            src="https://cjwbw-wav2lip.hf.space" 
            id="aiFrame"
            allow="microphone; camera"
            onload="document.getElementById('loader').style.display='none';">
        </iframe>
    </div>
</div>

</body>
</html>
