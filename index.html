<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sıfırdan HTML Yapay Zeka</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f2f5;
            padding: 20px;
        }
        canvas {
            background-color: white;
            border: 2px solid #333;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background-color: #0056b3; }
        #info { margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Sıfırdan Yapay Zeka (Tek Hücreli Nöron)</h1>
    <p>Yapay zeka, kırmızı çizginin <b>üstündeki</b> noktaları mavi, <b>altındaki</b> noktaları turuncu yapmayı öğreniyor.</p>
    
    <canvas id="canvas" width="400" height="400"></canvas>
    <br>
    <button onclick="egit()">100 Kez Eğit</button>
    <div id="info">Henüz eğitilmedi.</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const info = document.getElementById('info');

    // Hedef fonksiyonumuz: y = x (Ekrandaki çapraz çizgi)
    // Yapay zeka bu çizginin varlığından habersiz, sadece noktaları tahmin etmeye çalışacak.
    function gercekCizgi(x) { return x; }

    // 1. YAPAY ZEKA YAPISI (Tek bir nöron)
    // İlk başta rastgele ağırlıklar (weights) veriyoruz
    let w1 = Math.random() * 2 - 1;
    let w2 = Math.random() * 2 - 1;
    let lr = 0.1; // Öğrenme oranı (Learning Rate)
    let egitimSayisi = 0;

    // Rastgele 100 tane nokta (Veri Seti) oluşturuyoruz
    let noktalar = [];
    for (let i = 0; i < 100; i++) {
        let x = Math.random() * canvas.width;
        let y = Math.random() * canvas.height;
        // Gerçek etiket: Çizginin üstündeyse 1, altındaysa -1
        let dogruEtiket = y < gercekCizgi(x) ? 1 : -1;
        noktalar.push({x: x, y: y, etiket: dogruEtiket});
    }

    // Yapay zekanın tahmin fonksiyonu (Aktivasyon Fonksiyonu)
    function tahminEt(x, y) {
        let toplam = x * w1 + y * w2;
        return toplam >= 0 ? 1 : -1;
    }

    // 2. EĞİTİM FONKSİYONU (Yapay Zeka Hatalarından Öğreniyor)
    function egit() {
        for (let i = 0; i < 100; i++) {
            // Rastgele bir nokta seç
            let nokta = noktalar[Math.floor(Math.random() * noktalar.length)];
            
            // Yapay zekaya sor: "Sence bu noktanın yeri ne?"
            let tahmin = tahminEt(nokta.x, nokta.y);
            
            // Hatayı hesapla (Gerçek değerden tahmini çıkar)
            let hata = nokta.etiket - tahmin;

            // Eğer hata varsa ağırlıkları düzelt (Geri Yayılım - Backpropagation mantığı)
            w1 += hata * nokta.x * lr;
            w2 += hata * nokta.y * lr;
        }
        egitimSayisi += 100;
        info.innerText = `Toplam Eğitim Adımı: ${egitimSayisi}`;
        ciz();
    }

    // 3. EKRANA ÇİZME FONKSİYONU
    function ciz() {
        // Ekranı temizle
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // İdeal Çizgiyi Çiz (Kırmızı)
        ctx.strokeStyle = "red";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(canvas.width, canvas.height);
        ctx.stroke();

        // Noktaları Çiz
        noktalar.forEach(nokta => {
            // Yapay zekanın o anki ağırlıklarına göre tahmini alıyoruz
            let tahmin = tahminEt(nokta.x, nokta.y);

            ctx.beginPath();
            ctx.arc(nokta.x, nokta.y, 6, 0, 2 * Math.PI);
            
            // Yapay zeka 1 dediyse Maviye, -1 dediyse Turuncuya boya
            if (tahmin === 1) {
                ctx.fillStyle = "#007bff"; // Mavi
            } else {
                ctx.fillStyle = "#ffc107"; // Turuncu
            }
            ctx.fill();
            
            // Eğer yapay zeka yanlış bildiyse noktanın etrafına siyah halka koy
            if (tahmin !== nokta.etiket) {
                ctx.strokeStyle = "black";
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        });
    }

    // İlk çizimi yap
    ciz();
</script>

</body>
</html>
