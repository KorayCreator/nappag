// Bu bölüm, verdiğim HTML dosyasındaki <script> etiketinin hemen altını değiştirecek.

// 1. ÖNCE: Görseldeki 6 özgün avatar resmini bilgisayarına indir ve 'img' adında bir klasöre kaydet.
// (Ör: img/asya_aria.png, img/avrupa_jack.png, vb.)

// 2. SONRA: Aşağıdaki diziyi mevcut kodunla değiştir:

const avatars = [
    { name: "Asya (Aria)", image: "img/asya_aria.png", gender: "female" },
    { name: "Avrupa (Jack)", image: "img/avrupa_jack.png", gender: "male" },
    { name: "Afrika (Zuri)", image: "img/afrika_zuri.png", gender: "female" },
    { name: "Ortadoğu (Amir)", image: "img/ortadogu_amir.png", gender: "male" },
    { name: "Latin (Elena)", image: "img/latin_elena.png", gender: "female" },
    { name: "Robot (Robo-X)", image: "img/robot_robox.png", gender: "neutral" }
];

const avatarContainer = document.getElementById('avatar-container');
const textInput = document.getElementById('text-to-speak');
const voiceSelect = document.getElementById('voice-select');

let synth = window.speechSynthesis;
let voices = [];

// Tarayıcıdaki kullanılabilir sesleri yükleme fonksiyonu
function populateVoiceList() {
    voices = synth.getVoices();
    voiceSelect.innerHTML = '';
    
    voices.forEach((voice, i) => {
        const option = document.createElement('option');
        option.textContent = `${voice.name} (${voice.lang})`;
        option.value = i;
        
        if(voice.lang.includes('tr-TR') || voice.lang.includes('tr')) {
            option.selected = true;
        }
        voiceSelect.appendChild(option);
    });
}

populateVoiceList();
if (speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = populateVoiceList;
}

// ÖZGÜN AVATARLARI EKLEME BÖLÜMÜ (GÜNCELLENDİ)
avatars.forEach((avatar, index) => {
    const card = document.createElement('div');
    card.className = 'avatar-card';
    card.id = `avatar-${index}`; // Her karta benzersiz ID
    
    // API yerine KENDİ ÖZGÜN RESİMLERİNİ kullanıyoruz
    card.innerHTML = `
        <img src="${avatar.image}" alt="${avatar.name}">
        <span>${avatar.name}</span>
        <button class="speak-btn">
            <span class="btn-text">Konuştur</span>
            <span class="speak-icon">🔊</span>
        </button>
    `;

    card.addEventListener('click', () => {
        speakText(index);
    });

    avatarContainer.appendChild(card);
});

// Metni seslendirme fonksiyonu (Küçük görsel geri bildirim eklendi)
function speakText(avatarIndex) {
    if (synth.speaking) {
        synth.cancel();
    }

    const text = textInput.value.trim();
    if (text === '') {
        alert('Lütfen avatarın söylemesi için bir metin yazın!');
        return;
    }

    const utterThis = new SpeechSynthesisUtterance(text);
    
    if (voiceSelect.value !== "") {
        utterThis.voice = voices[voiceSelect.value];
    }

    utterThis.pitch = 1; 
    utterThis.rate = 1;  

    // Görsel Geri Bildirim: Konuşurken avatar kartına sınıf ekle (CSS ile ağız oynatma/dalga efekti için)
    const activeCard = document.getElementById(`avatar-${avatarIndex}`);
    
    utterThis.onstart = function() {
        activeCard.classList.add('speaking'); // CSS'te '.speaking' sınıfını tanımlamalısın
    };

    utterThis.onend = function() {
        activeCard.classList.remove('speaking');
    };

    synth.speak(utterThis);
}
