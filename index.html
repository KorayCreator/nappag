
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kutsal Kitaplar Dijital Kütüphanesi</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Lora:ital,wght@0,500;0,700;1,400&family=Amiri:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Genel Arayüz ve Temel Yapı */
        :root {
            --panel-bg: #29241d;
            --panel-accent: #dfb76c;
            --text-gold: #b3862b;
            --page-bg: #f5edd6; /* Gerçekçi eski parşömen rengi */
        }

        body {
            margin: 0;
            padding: 0;
            background: #14110e;
            font-family: 'Lora', serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            color: #fff;
        }

        /* SOL KONTROL PANELİ (Diyanet Tasarımı) */
        .sidebar {
            width: 260px;
            background: var(--panel-bg);
            border-right: 2px solid #3d352b;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
            box-shadow: 5px 0 25px rgba(0,0,0,0.7);
            z-index: 10;
        }

        .logo-area {
            font-family: 'Cinzel', serif;
            color: var(--panel-accent);
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 25px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            border-bottom: 1px solid #3d352b;
            width: 100%;
            text-align: center;
            padding-bottom: 15px;
        }

        /* Ses ve Oynatma Dairesi */
        .audio-player-circle {
            width: 110px;
            height: 110px;
            border: 4px solid var(--panel-accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 15px;
            box-shadow: 0 0 15px rgba(223,183,108,0.3), inset 0 0 15px rgba(0,0,0,0.5);
            background: #1f1a15;
        }

        .player-btn {
            background: none;
            border: none;
            color: var(--panel-accent);
            font-size: 35px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .player-btn:hover { transform: scale(1.1); }

        .player-controls-mini {
            display: flex;
            gap: 15px;
            color: #8c7e6c;
            margin-bottom: 25px;
            font-size: 16px;
        }
        .player-controls-mini i { cursor: pointer; transition: color 0.2s; }
        .player-controls-mini i:hover { color: var(--panel-accent); }

        /* Menü Linkleri */
        .sidebar-menu {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            color: #c4b9a9;
            text-decoration: none;
            font-size: 14px;
            border-radius: 4px;
            transition: all 0.3s;
            cursor: pointer;
            border-left: 3px solid transparent;
        }

        .menu-item i { width: 20px; text-align: center; color: var(--panel-accent); }
        .menu-item:hover, .menu-item.active {
            background: #383127;
            color: #fff;
            border-left-color: var(--panel-accent);
        }

        /* SAĞ ANA ALAN */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* ÜST BAR VE NAVİGASYON */
        header {
            height: 60px;
            background: #211c17;
            border-bottom: 1px solid #3d352b;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 5;
        }

        .book-selector-tabs {
            display: flex;
            gap: 10px;
        }

        .book-tab {
            background: #2d261e;
            border: 1px solid #4a3f31;
            color: #c4b9a9;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-size: 12px;
            transition: all 0.3s;
        }

        .book-tab.active, .book-tab:hover {
            background: var(--panel-accent);
            color: #000;
            border-color: var(--panel-accent);
            font-weight: bold;
        }

        .top-dropdowns {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        select {
            background: #2d261e;
            color: #fff;
            border: 1px solid #4a3f31;
            padding: 6px 12px;
            border-radius: 4px;
            font-family: inherit;
            cursor: pointer;
        }

        /* GERÇEKÇİ KİTAP ALANI VE ÇİFT SAYFA */
        .workspace {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            background: radial-gradient(circle, #241f19 0%, #110e0c 100%);
        }

        .book-container {
            width: 100%;
            max-width: 1100px;
            height: 85vh;
            max-height: 680px;
            display: flex;
            background: var(--page-bg);
            border-radius: 4px 15px 15px 4px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.8), 
                        inset 10px 0 30px rgba(0,0,0,0.15);
            position: relative;
            color: #2c251e;
        }

        /* Kitabın Ortasındaki Derin Cilt Gölgesi */
        .book-spine {
            position: absolute;
            left: 50%;
            top: 0;
            width: 40px;
            height: 100%;
            background: linear-gradient(to right, 
                rgba(0,0,0,0.2) 0%, 
                rgba(0,0,0,0.4) 40%, 
                rgba(0,0,0,0.6) 50%, 
                rgba(0,0,0,0.4) 60%, 
                rgba(0,0,0,0.2) 100%);
            transform: translateX(-50%);
            z-index: 5;
        }

        /* Sayfalar */
        .book-page {
            width: 50%;
            height: 100%;
            padding: 35px 45px;
            box-sizing: border-box;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .book-page-left {
            border-right: 1px solid rgba(0,0,0,0.08);
        }

        /* DİYANET SÜSLEMELİ TEZHİP BAŞLIĞI */
        .tezhip-header {
            border: 4px double var(--text-gold);
            background: #1e3d59; /* İslami/Klasik mavi tonlu motif arka planı */
            color: #fff;
            text-align: center;
            padding: 12px;
            font-family: 'Cinzel', serif;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15), inset 0 0 10px rgba(255,255,255,0.1);
            position: relative;
            border-radius: 2px;
        }

        /* Çerçeve Süsleme Detayları (Görseldeki Gibi Kenarlık Efekti) */
        .tezhip-header::before, .tezhip-header::after {
            content: '✦';
            color: var(--panel-accent);
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
        }
        .tezhip-header::before { left: 15px; }
        .tezhip-header::after { right: 15px; }

        /* Yazı Alanları */
        .page-meta {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #7a6e5d;
            border-bottom: 1px solid rgba(0,0,0,0.08);
            padding-bottom: 5px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .verse-content {
            font-size: 17px;
            line-height: 1.9;
            text-align: justify;
            overflow-y: auto;
            flex: 1;
        }

        /* Arapça Metin Stili */
        .arabic-text {
            font-family: 'Amiri', serif;
            font-size: 26px;
            direction: rtl;
            line-height: 2.2;
            text-align: right;
        }

        /* Ayet Sonu Numarası (Diyanet Tarzı Yuvarlak İkon) */
        .verse-number-badge {
            display: inline-block;
            width: 26px;
            height: 26px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%23b3862b" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>') no-repeat center;
            background-size: contain;
            text-align: center;
            line-height: 26px;
            font-size: 11px;
            font-weight: bold;
            color: var(--text-gold);
            margin: 0 5px;
            font-family: 'Cinzel', serif;
        }

        /* Sayfa Çevirme Okları */
        .page-nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(41, 36, 29, 0.9);
            border: 1px solid var(--panel-accent);
            color: var(--panel-accent);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transition: all 0.2s;
            z-index: 10;
        }
        .page-nav-arrow:hover { background: var(--panel-accent); color: #000; }
        .arrow-prev { left: -22px; }
        .arrow-next { right: -22px; }

        /* Kaydırma Çubuğu Estetiği */
        .book-page::-webkit-scrollbar { width: 4px; }
        .book-page::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }

        /* Sayfa Çevirme Animasyonu Sınıfı */
        .flip-active { animation: pageFlipSim 0.5s ease-in-out; }
        @keyframes pageFlipSim {
            0% { opacity: 0.6; transform: scale(0.99); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-area">KUTSAL KÜTÜPHANE</div>
        
        <div class="audio-player-circle">
            <button class="player-btn"><i class="fa-solid fa-play"></i></button>
        </div>
        <div class="player-controls-mini">
            <i class="fa-solid fa-volume-high"></i>
            <i class="fa-solid fa-list-ul"></i>
            <i class="fa-solid fa-user"></i>
        </div>

        <div class="sidebar-menu">
            <div class="menu-item active"><i class="fa-solid fa-book-open"></i> <span>Ana Sayfa</span></div>
            <div class="menu-item"><i class="fa-solid fa-magnifying-glass"></i> <span>Arama</span></div>
            <div class="menu-item"><i class="fa-solid fa-layer-group"></i> <span>Tefsir / Açıklama</span></div>
            <div class="menu-item"><i class="fa-solid fa-book"></i> <span>Fihrist</span></div>
            <div class="menu-item"><i class="fa-solid fa-language"></i> <span>Dil Çevirisi Altı</span></div>
            
            <div id="google_translate_element" style="margin-top: 15px; padding: 5px;"></div>
        </div>
    </div>

    <div class="main-content">
        <header>
            <div class="book-selector-tabs">
                <button class="book-tab active" onclick="changeBook('quran', this)">KUR'AN-I KERİM</button>
                <button class="book-tab" onclick="changeBook('bible', this)">İNCİL (MATTA)</button>
                <button class="book-tab" onclick="changeBook('torah', this)">TEVRAT (GENESIS)</button>
            </div>

            <div class="top-dropdowns">
                <select id="chapter-select" onchange="loadBookContent()"></select>
            </div>
        </header>

        <div class="workspace">
            <div class="book-container" id="book-frame">
                <button class="page-nav-arrow arrow-prev" onclick="navigateChapter(-1)"><i class="fa-solid fa-chevron-left"></i></button>
                <div class="book-spine"></div>
                
                <div class="book-page book-page-left">
                    <div class="page-meta">
                        <span id="left-meta-title">Fâtiha Sûresi</span>
                        <span>Cüz 1</span>
                    </div>
                    <div class="tezhip-header" id="left-tezhip-title">Fâtiha Sûresi</div>
                    <div class="verse-content" id="left-page-text">
                        </div>
                </div>

                <div class="book-page">
                    <div class="page-meta">
                        <span id="right-meta-title">سُورةُ الفَاتِحَة</span>
                        <span>1. Sayfa</span>
                    </div>
                    <div class="tezhip-header" id="right-tezhip-title">سُورةُ الفَاتِحَة</div>
                    <div class="verse-content" id="right-page-text">
                        </div>
                </div>

                <button class="page-nav-arrow arrow-next" onclick="navigateChapter(1)"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>
    </div>

    <script>
        let activeBook = 'quran';

        const apiRoutes = {
            quran: { title: "Kur'an-ı Kerim", rightTitle: "سُورةُ الفَاتِحَة", chapters: 114, url: (id) => `https://api.alquran.cloud/v1/surah/${id}/editions/tr.diyanet,ar.alafasy` },
            bible: { title: "İncil (Matta)", rightTitle: "The Holy Bible", chapters: 28, url: (id) => `https://bible-api.com/matthew+${id}` },
            torah: { title: "Tevrat (Yaratılış)", rightTitle: "Torah (Genesis)", chapters: 50, url: (id) => `https://bible-api.com/genesis+${id}` }
        };

        function changeBook(bookKey, element) {
            activeBook = bookKey;
            document.querySelectorAll('.book-tab').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');

            const select = document.getElementById('chapter-select');
            select.innerHTML = '';
            for(let i = 1; i <= apiRoutes[bookKey].chapters; i++) {
                let opt = document.createElement('option');
                opt.value = i;
                opt.text = bookKey === 'quran' ? `${i}. Sure` : `${i}. Bölüm / Bab`;
                select.appendChild(opt);
            }
            loadBookContent();
        }

        function triggerFlipAnimation() {
            const frame = document.getElementById('book-frame');
            frame.classList.remove('flip-active');
            void frame.offsetWidth;
            frame.classList.add('flip-active');
        }

        function navigateChapter(direction) {
            const select = document.getElementById('chapter-select');
            let targetIndex = select.selectedIndex + direction;
            if (targetIndex >= 0 && targetIndex < select.options.length) {
                select.selectedIndex = targetIndex;
                loadBookContent();
            }
        }

        async function loadBookContent() {
            triggerFlipAnimation();
            const id = document.getElementById('chapter-select').value || 1;
            const leftPage = document.getElementById('left-page-text');
            const rightPage = document.getElementById('right-page-text');

            leftPage.innerHTML = `<p style="text-align:center;color:#7a6e5d;margin-top:40%"><i class="fa-solid fa-spinner fa-spin"></i> Sayfa Hazırlanıyor...</p>`;
            rightPage.innerHTML = leftPage.innerHTML;

            try {
                const response = await fetch(apiRoutes[activeBook].url(id));
                const json = await response.json();

                leftPage.innerHTML = '';
                rightPage.innerHTML = '';

                if (activeBook === 'quran') {
                    const trVerses = json.data[0].ayahs;
                    const arVerses = json.data[1].ayahs;

                    document.getElementById('left-meta-title').innerText = json.data[0].englishName;
                    document.getElementById('left-tezhip-title').innerText = json.data[0].name;
                    document.getElementById('right-meta-title').innerText = json.data[0].englishNameTranslation;
                    document.getElementById('right-tezhip-title').innerText = json.data[0].name;

                    trVerses.forEach((v, index) => {
                        leftPage.innerHTML += `<div><b>[${v.numberInSurah}]</b> ${v.text}</div><br>`;
                    });

                    rightPage.classList.add('arabic-text');
                    arVerses.forEach((v) => {
                        rightPage.innerHTML += `${v.text} <span class="verse-number-badge">${v.numberInSurah}</span> `;
                    });
                } else {
                    rightPage.classList.remove('arabic-text');
                    document.getElementById('left-meta-title').innerText = apiRoutes[activeBook].title;
                    document.getElementById('left-tezhip-title').innerText = `${id}. Bölüm`;
                    document.getElementById('right-meta-title').innerText = apiRoutes[activeBook].rightTitle;
                    document.getElementById('right-tezhip-title').innerText = `Chapter ${id}`;

                    // Tevrat ve İncil için çift taraflı paralel okuma metni
                    json.verses.forEach(v => {
                        leftPage.innerHTML += `<div><b>[${v.verse}]</b> ${v.text}</div><br>`;
                        rightPage.innerHTML += `<div><span class="verse-num">[${v.verse}]</span> ${v.text}</div><br>`;
                    });
                }
            } catch (err) {
                leftPage.innerHTML = `<p style="color:red;text-align:center;">Hata oluştu.</p>`;
                rightPage.innerHTML = leftPage.innerHTML;
            }
        }

        window.onload = () => {
            changeBook('quran', document.querySelectorAll('.book-tab')[0]);
        };
    </script>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'tr',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
