<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinematik AI Karakter Konuşturma</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f12;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #1a1a24;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 450px;
            text-align: center;
        }
        h2 { color: #ff3366; margin-bottom: 20px; }
        textarea {
            width: 100%;
            height: 100px;
            background: #252538;
            border: 1px solid #3f3f5c;
            color: white;
            padding: 10px;
            border-radius: 8px;
            resize: none;
            box-sizing: border-box;
        }
        select, button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
        }
        select { background: #252538; color: white; border: 1px solid #3f3f5c; }
        button {
            background: linear-gradient(45deg, #ff3366, #ff6633);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { opacity: 0.9; transform: scale(1.02); }
        .video-box {
            margin-top: 20px;
            width: 100%;
            height: 250px;
            background: #000;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<div class="container">
    <h2>AI Karakter Stüdyosu</h2>
    
    <label for="character">Bir Karakter Seçin:</label>
    <select id="character">
        <option value="cyberpunk_girl">Siberpunk Savaşçı (Kadın)</option>
        <option value="detective_man">Dedektif (Erkek)</option>
        <option value="historical_king">Antik Kral (Erkek)</option>
    </select>

    <label style="display:block; margin-top:15px;" for="text-input">Söylenmesini İstediğiniz Metin:</label>
    <textarea id="text-input" placeholder="Karakterin film gibi seslendirmesini istediğiniz repliği buraya yazın..."></textarea>

    <button onclick="generateVideo()">Gerçekçi Video Üret</button>

    <div class="video-box" id="video-container">
        <p id="placeholder-text" style="color: #666;">Video burada görünecek...</p>
    </div>
</div>

<script>
    function generateVideo() {
        const text = document.getElementById('text-input').value;
        const character = document.getElementById('character').value;
        const videoContainer = document.getElementById('video-container');
        const placeholder = document.getElementById('placeholder-text');

        if (!text.trim()) {
            alert("Lütfen karakterin söylemesi için bir metin girin!");
            return;
        }

        placeholder.innerText = "Yapay zeka karakteri oluşturuyor... (Simülasyon)";
        
        // NOT: Gerçek bir projede buraya D-ID, HeyGen veya HeyGen benzeri bir API'ye 
        // istek (fetch/POST) atan JavaScript kodları eklenmelidir.
        
        // Simülasyon amaçlı 2 saniye sonra örnek bir video yüklüyoruz:
        setTimeout(() => {
            videoContainer.innerHTML = `
                <video controls autoplay>
                    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
                    Tarayıcınız video etiketini desteklemiyor.
                </video>
            `;
        }, 2000);
    }
</script>

</body>
</html>
