<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sinematik Karakter Motoru v5</title>
    <style>
        body {
            margin: 0; background: #080810; color: #fff;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .container {
            width: 90%; max-width: 500px; background: #141423;
            padding: 30px; border-radius: 24px; text-align: center;
            box-shadow: 0 15px 50px rgba(0, 242, 254, 0.2); border: 1px solid #222536;
        }
        h1 { font-size: 26px; color: #00f2fe; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        input, textarea, button {
            width: 100%; padding: 14px; margin-top: 15px; border-radius: 12px;
            border: none; box-sizing: border-box; font-size: 15px;
        }
        input, textarea { background: #1d1f30; color: white; border: 1px solid #2e324d; }
        textarea { height: 90px; resize: none; }
        button {
            background: linear-gradient(45deg, #00f2fe, #4facfe); color: #000;
            font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 25px;
        }
        button:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(0, 242, 254, 0.4); }
        .canvas-wrapper {
            margin-top: 25px; width: 100%; height: 380px;
            background: #000; border-radius: 16px; overflow: hidden;
            border: 2px solid #2e324d; position: relative;
        }
        canvas { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<div class="container">
    <h1>Karakter Motoru v5.0</h1>
    <p style="color: #7979a3; font-size: 14px; margin-top: -10px;">Gelişmiş Piksel Esnetme Teknolojisi (Sıfır Hata)</p>
    
    <input type="file" id="imgLoader" accept="image/*">
    <textarea id="textInput" placeholder="Karakterin kuracağı cümleyi buraya yaz..."></textarea>
    <button onclick="talkNow()">GERÇEKÇİ KONUŞTUR</button>

    <div class="canvas-wrapper">
        <canvas id="liveCanvas"></canvas>
    </div>
</div>

<script>
    const imgLoader = document.getElementById('imgLoader');
    const canvas = document.getElementById('liveCanvas');
    const ctx = canvas.getContext('2d');
    let uploadedImg = new Image();

    imgLoader.addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            uploadedImg.src = event.target.result;
            uploadedImg.onload = function() {
                canvas.width = uploadedImg.width;
                canvas.height = uploadedImg.height;
                ctx.drawImage(uploadedImg, 0, 0);
            }
        }
        reader.readAsDataURL(e.target.files[0]);
    });

    function talkNow() {
        const text = document.getElementById('textInput').value;
        if (!uploadedImg.src) return alert("Lütfen önce bir fotoğraf yükle!");
        if (!text.trim()) return alert("Karaktere söyletmek için bir metin yaz!");

        const speech = new SpeechSynthesisUtterance(text);
        speech.lang = 'tr-TR';

        let animationId;

        speech.onstart = () => {
            function render() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(uploadedImg, 0, 0);

                // İllüzyon: Fotoğrafın alt orta (ağız) kısmındaki pikselleri matematiksel olarak esnetiyoruz
                // Siyah yuvarlak yok, fotoğrafın kendi dokusu aşağı yukarı hareket ediyor
                const mouthY = canvas.height * 0.68; // Ortalama ağız hizası
                const mouthX = canvas.width * 0.5;
                const mouthWidth = canvas.width * 0.25;
                const mouthHeight = canvas.height * 0.12;

                // Ses dalgası simülasyonu
                const wave = Math.abs(Math.sin(Date.now() / 90)) * 12;

                // Ağız piksellerini dikey eksende gererek açılma hissi veriyoruz
                ctx.drawImage(
                    canvas, 
                    mouthX - mouthWidth/2, mouthY, mouthWidth, mouthHeight, // Orijinal alan
                    mouthX - mouthWidth/2, mouthY + (wave/3), mouthWidth, mouthHeight + wave // Değişen alan
                );

                animationId = requestAnimationFrame(render);
            }
            render();
        };

        speech.onend = () => {
            cancelAnimationFrame(animationId);
            // Konuşma bittiğinde orijinal resmi temizce geri yükle
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(uploadedImg, 0, 0);
        };

        window.speechSynthesis.speak(speech);
    }
</script>

</body>
</html>
