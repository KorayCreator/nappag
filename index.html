<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sinematik Karakter Motoru v7.5</title>
    <style>
        body {
            margin: 0; background: #080810; color: #fff;
            font-family: system-ui, sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .container {
            width: 90%; max-width: 500px; background: #141423;
            padding: 30px; border-radius: 24px; text-align: center;
            box-shadow: 0 15px 50px rgba(0, 242, 254, 0.2); border: 1px solid #222536;
        }
        h1 { font-size: 24px; color: #00f2fe; margin-bottom: 5px; text-transform: uppercase; }
        input, textarea, button {
            width: 100%; padding: 14px; margin-top: 15px; border-radius: 12px;
            border: none; box-sizing: border-box; font-size: 15px;
        }
        input, textarea { background: #1d1f30; color: white; border: 1px solid #2e324d; }
        textarea { height: 80px; resize: none; }
        button {
            background: linear-gradient(45deg, #00f2fe, #4facfe); color: #000;
            font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 20px;
        }
        button:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(0, 242, 254, 0.4); }
        .canvas-wrapper {
            margin-top: 25px; width: 100%; height: 380px;
            background: #000; border-radius: 16px; overflow: hidden;
            border: 2px solid #2e324d; position: relative;
        }
        canvas { width: 100%; height: 100%; object-fit: cover; cursor: crosshair; }
        .info-tag { color: #7979a3; font-size: 13px; margin-top: 5px; }
        .controls { display: flex; justify-content: space-between; margin-top: 10px; font-size: 13px; color: #aaa; }
        .controls input { width: 45%; margin: 0; padding: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Karakter Motoru v7.5</h1>
    <p class="info-tag">Fotoğraftaki ağzın üzerine bir kez tıklayarak hedefi yerleştirin!</p>
    
    <input type="file" id="imgLoader" accept="image/*">
    
    <div class="controls">
        <label>Genişlik: <input type="range" id="wSize" min="20" max="200" value="80" oninput="updateSize()"></label>
        <label>Yükseklik: <input type="range" id="hSize" min="10" max="100" value="40" oninput="updateSize()"></label>
    </div>

    <textarea id="textInput" placeholder="Karakterin söyleyeceği cümleyi buraya yaz..."></textarea>
    <button onclick="talkNow()">GERÇEKÇİ KONUŞTUR</button>

    <div class="canvas-wrapper">
        <canvas id="liveCanvas"></canvas>
    </div>
</div>

<script>
    const imgLoader = document.getElementById('imgLoader');
    const canvas = document.getElementById('liveCanvas');
    const ctx = canvas.getContext('2d');
    let uploadedImg = new Image();
    
    let mouthX = 0, mouthY = 0;
    let mouthWidth = 80, mouthHeight = 40;

    imgLoader.addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            uploadedImg.src = event.target.result;
            uploadedImg.onload = function() {
                canvas.width = uploadedImg.width;
                canvas.height = uploadedImg.height;
                // İlk açılışta resmi tam ortala
                mouthX = canvas.width / 2;
                mouthY = canvas.height * 0.7;
                drawScene(0);
            }
        }
        reader.readAsDataURL(e.target.files[0]);
    });

    function updateSize() {
        mouthWidth = parseInt(document.getElementById('wSize').value);
        mouthHeight = parseInt(document.getElementById('hSize').value);
        if(uploadedImg.src) drawScene(0);
    }

    function drawScene(wave) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(uploadedImg, 0, 0);

        if (wave > 0) {
            // Konuşma anında pikselleri dikey eksende geren dinamik esnetme
            ctx.drawImage(
                canvas, 
                mouthX - mouthWidth/2, mouthY - mouthHeight/2, mouthWidth, mouthHeight, 
                mouthX - mouthWidth/2, (mouthY - mouthHeight/2) - (wave/2), mouthWidth, mouthHeight + wave
            );
        } else {
            // Ayarlama anında tam hedefi gösteren kırmızı şeffaf kutu
            ctx.strokeStyle = "rgba(0, 242, 254, 0.8)";
            ctx.lineWidth = 3;
            ctx.strokeRect(mouthX - mouthWidth/2, mouthY - mouthHeight/2, mouthWidth, mouthHeight);
            ctx.fillStyle = "rgba(0, 242, 254, 0.15)";
            ctx.fillRect(mouthX - mouthWidth/2, mouthY - mouthHeight/2, mouthWidth, mouthHeight);
        }
    }

    // Tıklanan yere kutuyu ışınla
    canvas.addEventListener('click', (e) => {
        if (!uploadedImg.src) return;
        const rect = canvas.getBoundingClientRect();
        mouthX = ((e.clientX - rect.left) / rect.width) * canvas.width;
        mouthY = ((e.clientY - rect.top) / rect.height) * canvas.height;
        drawScene(0);
    });

    function talkNow() {
        const text = document.getElementById('textInput').value;
        if (!uploadedImg.src) return alert("Lütfen önce bir fotoğraf yükle!");
        if (!text.trim()) return alert("Karaktere söyletmek için bir metin yaz!");

        const speech = new SpeechSynthesisUtterance(text);
        speech.lang = 'tr-TR';
        let animationId;

        speech.onstart = () => {
            function render() {
                const wave = Math.abs(Math.sin(Date.now() / 75)) * (mouthHeight * 0.6);
                drawScene(wave);
                animationId = requestAnimationFrame(render);
            }
            render();
        };

        speech.onend = () => {
            cancelAnimationFrame(animationId);
            drawScene(0);
        };

        window.speechSynthesis.speak(speech);
    }
</script>

</body>
</html>
