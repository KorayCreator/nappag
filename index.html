<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nappag - Gerçek Zamanlı Topluluk Ağı</title>
    <style>
        :root {
            --nappag-orange: #ff6b00;
            --nappag-light-orange: #ff8533;
            --nappag-dark: #0a0a0a;
            --card-bg: #161616;
            --text-main: #ffffff;
            --text-secondary: #aaaaaa;
            --border-color: #262626;
            --danger-red: #ff3838;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--nappag-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        /* GİRİŞ VE KAYIT EKRANI */
        .auth-container {
            width: 100%;
            max-width: 450px;
            margin: auto;
            padding: 30px;
            background-color: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .auth-logo {
            font-size: 48px;
            font-weight: 900;
            color: var(--nappag-orange);
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: -2px;
        }

        /* ANA UYGULAMA PANELİ */
        .app-container {
            display: none; /* Giriş yapılınca açılacak */
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 25px;
            padding: 25px;
            height: 100vh;
        }

        /* SOL PANEL (PROFİL & NAVİGASYON) */
        .left-sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .profile-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .profile-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--nappag-orange);
            margin-bottom: 10px;
            background: #222;
        }

        /* ORTA AKIŞ (GÖNDERİLER VE CANLI YAYINLAR) */
        .feed-area {
            overflow-y: auto;
            padding-right: 10px;
            height: calc(100vh - 50px);
        }

        .feed-area::-webkit-scrollbar {
            width: 6px;
        }
        .feed-area::-webkit-scrollbar-thumb {
            background-color: var(--border-color);
            border-radius: 3px;
        }

        /* TURUNCU KUTU BEYAZ YILDIZ ROZETİ */
        .star-badge {
            background-color: var(--nappag-orange);
            color: white;
            font-weight: bold;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 4px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-left: 5px;
            box-shadow: 0 0 8px rgba(255, 107, 0, 0.4);
        }

        /* GÖNDERİ KARTLARI */
        .nappag-post {
            background-color: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            margin-bottom: 25px;
            overflow: hidden;
        }

        .post-header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .author-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .author-img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }

        .post-media {
            width: 100%;
            background: #000;
            display: flex;
            justify-content: center;
        }

        .post-media img, .post-media video {
            max-width: 100%;
            max-height: 450px;
            object-fit: contain;
        }

        /* CANLI YAYIN EKRANI */
        .live-screen {
            background: linear-gradient(135deg, #1e0030 0%, #380000 100%);
            height: 350px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .live-tag {
            position: absolute;
            top: 15px;
            left: 15px;
            background-color: var(--danger-red);
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
            animation: pulse 1.5s infinite;
        }

        /* FORMLAR VE BUTONLAR */
        input, textarea, select {
            width: 100%;
            background-color: #0f0f0f;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 15px;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--nappag-orange);
        }

        button {
            background-color: var(--nappag-orange);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        button:hover {
            background-color: var(--nappag-light-orange);
        }

        button.secondary-btn {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            margin-top: 10px;
        }

        button.danger-btn {
            background-color: var(--danger-red);
            padding: 6px 12px;
            font-size: 12px;
            width: auto;
        }

        .nickname-tag {
            font-size: 12px;
            color: var(--nappag-orange);
            background: rgba(255,107,0,0.1);
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 5px;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="auth-container" id="authScreen">
        <div class="auth-logo">nappag</div>
        
        <div id="loginForm">
            <h3 style="margin-bottom: 15px; text-align: center;">Oturum Aç</h3>
            <input type="text" id="loginUsername" placeholder="Kullanıcı Adı (@ olmadan)">
            <input type="password" id="loginPassword" placeholder="Şifre">
            <button onclick="handleLogin()">Giriş Yap</button>
            <button class="secondary-btn" onclick="toggleAuthView(false)">Hesabın yok mu? Katıl</button>
        </div>

        <div id="registerForm" style="display: none;">
            <h3 style="margin-bottom: 15px; text-align: center;">nappag'a Katıl</h3>
            <input type="text" id="regUsername" placeholder="Kullanıcı Adı (Örn: mert)">
            <input type="text" id="regNickname" placeholder="Topluluk Lakabı (Örn: KaraŞövalye)">
            <input type="password" id="regPassword" placeholder="Şifre">
            <button onclick="handleRegister()">Kayıt Ol ve Başlat</button>
            <button class="secondary-btn" onclick="toggleAuthView(true)">Zaten üye misin? Giriş Yap</button>
        </div>
    </div>

    <div class="app-container" id="appScreen">
        
        <div class="left-sidebar">
            <div class="auth-logo" style="text-align: left; font-size: 32px; margin-bottom: 0;">nappag</div>
            
            <div class="profile-card">
                <img src="" class="profile-avatar" id="myAvatar">
                <div style="font-weight: bold; display: flex; align-items: center; justify-content: center;">
                    <span id="myUsername"></span>
                    <span id="myStarSlot"></span>
                </div>
                <div id="myNickname" class="nickname-tag" style="display:inline-block; margin-top:5px;"></div>
                <p id="myBio" style="font-size: 13px; color: var(--text-secondary); margin-top: 10px; font-style: italic;"></p>
                
                <div style="margin-top: 15px; font-size: 12px; color: var(--nappag-orange);" id="myFollowerCount"></div>
            </div>

            <div class="profile-card" style="text-align: left;">
                <h4 style="font-size: 13px; color: var(--text-secondary); margin-bottom: 10px; text-transform: uppercase;">Profili Düzenle</h4>
                <input type="text" id="editNickname" placeholder="Yeni Lakap" style="margin-bottom:8px; padding:8px;">
                <input type="text" id="editBio" placeholder="Açıklama Ekle/Değiştir" style="margin-bottom:8px; padding:8px;">
                <input type="text" id="editAvatar" placeholder="Profil Resmi URL" style="margin-bottom:8px; padding:8px;">
                <input type="number" id="editFollowers" placeholder="Takipçi Sayısı Ayarla" style="margin-bottom:8px; padding:8px;">
                <button onclick="saveProfileChanges()" style="padding: 8px; font-size: 13px;">Güncelle</button>
                <button onclick="deleteMyAccount()" style="padding: 8px; font-size: 13px; background:#d63031; margin-top:5px;">Hesabımı Sil</button>
            </div>

            <button onclick="handleLogout()" style="background: #222; border: 1px solid var(--border-color);">Güvenli Çıkış</button>
        </div>

        <div class="feed-area">
            
            <div class="profile-card" style="text-align: left; margin-bottom: 25px;">
                <h3 style="font-size: 16px; margin-bottom: 15px; color: var(--nappag-orange);">Yeni İçerik Paylaş</h3>
                
                <textarea id="postContent" placeholder="Neler oluyor? Küfürler otomatik filtrelenir..." rows="2" style="margin-bottom: 10px;"></textarea>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <select id="mediaType" onchange="toggleMediaField()">
                        <option value="photo">🖼️ Fotoğraf Ekle</option>
                        <option value="video">🎥 Video Ekle</option>
                        <option value="live">🔴 Canlı Yayın Başlat</option>
                    </select>

                    <select id="coAuthorField">
                        <option value="">🤝 Ortak Yazar Seç (İsteğe Bağlı)</option>
                        </select>
                </div>
                
                <input type="text" id="mediaUrl" placeholder="Fotoğraf veya Video URL'si girin" style="margin-top: 10px; margin-bottom: 15px;">
                
                <button onclick="submitPost()">nappag Akışına Gönder</button>
            </div>

            <div id="globalFeed"></div>
        </div>

    </div>

    <script>
        // Küfür Filtresi Listesi
        const BAD_WORDS = ["küfür1", "küfür2", "salak", "aptal", "mal", "gerizekalı"];

        // KALICI VERİ TABANI SİMÜLASYONU (Local Storage)
        if (!localStorage.getItem("nappag_users")) {
            localStorage.setItem("nappag_users", JSON.stringify({}));
        }
        if (!localStorage.getItem("nappag_posts")) {
            localStorage.setItem("nappag_posts", JSON.stringify([]));
        }

        let sessionUser = null;

        // Yardımcı Veri Çekme Fonksiyonları
        function getUsers() { return JSON.parse(localStorage.getItem("nappag_users")); }
        function saveUsers(data) { localStorage.setItem("nappag_users", JSON.stringify(data)); }
        function getPosts() { return JSON.parse(localStorage.getItem("nappag_posts")); }
        function savePosts(data) { localStorage.setItem("nappag_posts", JSON.stringify(data)); }

        // Küfür Filtre Motoru
        function filterSwearWords(text) {
            let clean = text;
            BAD_WORDS.forEach(word => {
                let regex = new RegExp(word, "gi");
                clean = clean.replace(regex, "***");
            });
            return clean;
        }

        // Giriş/Kayıt Ekranı Değiştirici
        function toggleAuthView(showLogin) {
            document.getElementById("loginForm").style.display = showLogin ? "block" : "none";
            document.getElementById("registerForm").style.display = showLogin ? "none" : "block";
        }

        // KAYIT OLMA SİSTEMİ
        function handleRegister() {
            let username = document.getElementById("regUsername").value.trim().toLowerCase();
            let nickname = document.getElementById("regNickname").value.trim();
            let password = document.getElementById("regPassword").value;

            if (!username || !nickname || !password) {
                alert("Tüm alanları doldurun!");
                return;
            }

            let allUsers = getUsers();

            // GÜVENLİK: Bir kişi dışında kimse @admin olamaz koruması
            if (username === "admin" && allUsers["admin"]) {
                alert("Güvenlik İhlali: @admin hesabı zaten kurulu ve tektir!");
                return;
            }

            if (allUsers[username]) {
                alert("Bu kullanıcı adı zaten alınmış!");
                return;
            }

            // Yeni kullanıcıyı kaydet
            allUsers[username] = {
                username: username,
                nickname: filterSwearWords(nickname),
                password: password,
                bio: "nappag topluluğuna yeni katıldı.",
                avatar: "https://picsum.photos/id/1025/150/150",
                followers: 0,
                isBanned: false
            };

            saveUsers(allUsers);
            alert("Kayıt başarılı! Şimdi giriş yapabilirsiniz.");
            toggleAuthView(true);
        }

        // GİRİŞ YAPMA SİSTEMİ
        function handleLogin() {
            let username = document.getElementById("loginUsername").value.trim().toLowerCase();
            let password = document.getElementById("loginPassword").value;

            let allUsers = getUsers();
            let user = allUsers[username];

            if (!user || user.password !== password) {
                alert("Hatalı kullanıcı adı veya şifre!");
                return;
            }

            if (user.isBanned) {
                alert("🚨 HESABINIZ @admin TARAFINDAN BANLANMIŞTIR!");
                return;
            }

            sessionUser = user;
            initApp();
        }

        // UYGULAMAYI BAŞLATMA
        function initApp() {
            document.getElementById("authScreen").style.display = "none";
            document.getElementById("appScreen").style.display = "grid";

            // Profil Kartını Doldur
            updateProfileCardView();
            
            // Ortak yazar listesini güncelle
            refreshCoAuthorList();

            // Akışı Getir
            renderNappagFeed();
        }

        // PROFİL GÖRÜNTÜSÜNÜ YENİLEME
        function updateProfileCardView() {
            document.getElementById("myAvatar").src = sessionUser.avatar;
            document.getElementById("myUsername").innerText = "@" + sessionUser.username;
            document.getElementById("myNickname").innerText = sessionUser.nickname || "Lakap Yok";
            document.getElementById("myBio").innerText = sessionUser.bio || "";
            document.getElementById("myFollowerCount").innerText = `Takipçi: ${sessionUser.followers}`;

            // 100 Takipçiden Fazla Olanlarda Turuncu Kutu Beyaz Yıldız Rozeti
            let starSlot = document.getElementById("myStarSlot");
            if (sessionUser.followers > 100) {
                starSlot.innerHTML = `<span class="star-badge" title="Popüler Hesap">★</span>`;
            } else {
                starSlot.innerHTML = "";
            }

            // Düzenleme kutularını doldur
            document.getElementById("editNickname").value = sessionUser.nickname;
            document.getElementById("editBio").value = sessionUser.bio;
            document.getElementById("editAvatar").value = sessionUser.avatar;
            document.getElementById("editFollowers").value = sessionUser.followers;
        }

        // PROFİL DEĞİŞİKLİKLERİNİ KAYDETME (LAKAP, AÇIKLAMA, SİLME, DEĞİŞTİRME)
        function saveProfileChanges() {
            let allUsers = getUsers();
            let user = allUsers[sessionUser.username];

            let newNickname = document.getElementById("editNickname").value.trim();
            
            // Güvenlik: Admin kelimesini kimse taklit edemez
            if (newNickname.toLowerCase().includes("admin") && sessionUser.username !== "admin") {
                alert("Sistem Koruması: Lakapta 'admin' kelimesi geçemez!");
                return;
            }

            user.nickname = filterSwearWords(newNickname);
            user.bio = filterSwearWords(document.getElementById("editBio").value.trim());
            user.avatar = document.getElementById("editAvatar").value.trim() || user.avatar;
            user.followers = parseInt(document.getElementById("editFollowers").value) || 0;

            allUsers[sessionUser.username] = user;
            saveUsers(allUsers);
            sessionUser = user;

            alert("Profil güncellendi!");
            updateProfileCardView();
            renderNappagFeed();
        }

        // AÇIKLAMA VE GÖNDERİ SİLME (Kullanıcı Kendi Hesabını Silebilir)
        function deleteMyAccount() {
            if (sessionUser.username === "admin") {
                alert("Sistem yöneticisi silinemez!");
                return;
            }
            if (confirm("Hesabınızı kalıcı olarak silmek istediğinize emin misiniz?")) {
                let allUsers = getUsers();
                delete allUsers[sessionUser.username];
                saveUsers(allUsers);
                handleLogout();
            }
        }

        // ORTAK YAZAR SEÇİM LİSTESİNİ DOLDURMA
        function refreshCoAuthorList() {
            let select = document.getElementById("coAuthorField");
            select.innerHTML = '<option value="">🤝 Ortak Yazar Seç (İsteğe Bağlı)</option>';
            
            let allUsers = getUsers();
            for (let username in allUsers) {
                if (username !== sessionUser.username) {
                    select.innerHTML += `<option value="${username}">@${username} (${allUsers[username].nickname})</option>`;
                }
            }
        }

        // CANLI YAYIN YA DA MEDYA TÜRÜ DEĞİŞİNCE
        function toggleMediaField() {
            let type = document.getElementById("mediaType").value;
            let field = document.getElementById("mediaUrl");
            if (type === "live") {
                field.style.display = "none";
            } else {
                field.style.display = "block";
                field.placeholder = type === "photo" ? "Fotoğraf URL'si girin" : "Video URL'si (.mp4) girin";
            }
        }

        // GÖNDERİ VE CANLI YAYIN YAYINLAMA
        function submitPost() {
            let text = document.getElementById("postContent").value.trim();
            let type = document.getElementById("mediaType").value;
            let url = document.getElementById("mediaUrl").value.trim();
            let coAuthor = document.getElementById("coAuthorField").value;

            if (!text && type !== "live") {
                alert("Lütfen bir açıklama veya içerik girin!");
                return;
            }

            if (!url && type === "photo") url = "https://picsum.photos/800/500?random=" + Date.now();
            if (!url && type === "video") url = "https://www.w3schools.com/html/mov_bbb.mp4";

            let authors = [sessionUser.username];
            if (coAuthor) authors.push(coAuthor);

            let allPosts = getPosts();
            allPosts.unshift({
                id: "post_" + Date.now(),
                authors: authors,
                type: type,
                url: url,
                description: filterSwearWords(text),
                likes: [],
                comments: []
            });

            savePosts(allPosts);
            document.getElementById("postContent").value = "";
            document.getElementById("mediaUrl").value = "";
            renderNappagFeed();
        }

        // GÖNDERİ VE CANLI YAYIN SİLME (Kullanıcı kendi gönderisini, @admin ise her şeyi silebilir)
        function removePost(postId) {
            let allPosts = getPosts();
            let post = allPosts.find(p => p.id === postId);

            if (sessionUser.username === "admin" || post.authors.includes(sessionUser.username)) {
                allPosts = allPosts.filter(p => p.id !== postId);
                savePosts(allPosts);
                renderNappagFeed();
            } else {
                alert("Buna yetkiniz yok!");
            }
        }

        // @admin İSTEDİĞİ HESABI BANLAYABİLECEK
        function adminBanUser(usernameToBan) {
            if (sessionUser.username !== "admin") {
                alert("Bu yetki sadece @admin kullanıcısına aittir!");
                return;
            }
            let allUsers = getUsers();
            if (allUsers[usernameToBan]) {
                allUsers[usernameToBan].isBanned = true;
                saveUsers(allUsers);
                alert(`@${usernameToBan} başarıyla sistemden yasaklandı.`);
                renderNappagFeed();
            }
        }

        // ETKİLEŞİM: BEĞENİ ATMA
        function likePost(postId) {
            let allPosts = getPosts();
            let post = allPosts.find(p => p.id === postId);
            if (post.likes.includes(sessionUser.username)) {
                post.likes = post.likes.filter(u => u !== sessionUser.username);
            } else {
                post.likes.push(sessionUser.username);
            }
            savePosts(allPosts);
            renderNappagFeed();
        }

        // ETKİLEŞİM: YORUM ATMA
        function commentPost(postId) {
            let input = document.getElementById(`comment_input_${postId}`);
            let text = input.value.trim();
            if (!text) return;

            let allPosts = getPosts();
            let post = allPosts.find(p => p.id === postId);

            post.comments.push({
                username: sessionUser.username,
                text: filterSwearWords(text)
            });

            savePosts(allPosts);
            input.value = "";
            renderNappagFeed();
        }

        // HERKES İÇİN GERÇEK ZAMANLI AKIŞ ÇİZİCİ
        function renderNappagFeed() {
            let feed = document.getElementById("globalFeed");
            feed.innerHTML = "";
            
            let allPosts = getPosts();
            let allUsers = getUsers();

            if (allPosts.length === 0) {
                feed.innerHTML = `<div class='profile-card' style='text-align:center; color:var(--text-secondary);'>Henüz nappag'da hiç gönderi paylaşılmamış. İlk sen paylaş!</div>`;
                return;
            }

            allPosts.forEach(post => {
                let card = document.createElement("div");
                card.className = "nappag-post";

                // Ortak yazarların ve rozetlerin HTML inşası
                let authorsHtml = post.authors.map(userKey => {
                    let u = allUsers[userKey] || { username: userKey, nickname: "Silinmiş Hesap", followers: 0 };
                    let starBadge = u.followers > 100 ? `<span class="star-badge">★</span>` : '';
                    let nickTag = u.nickname ? `<span class="nickname-tag">${u.nickname}</span>` : '';
                    return `<strong>@${u.username}</strong>${nickTag}${starBadge}`;
                }).join(" <span style='color:var(--text-secondary); font-size:12px;'>ve</span> ");

                // İçerik Türü Kontrolü
                let mediaHtml = "";
                if (post.type === "photo") {
                    mediaHtml = `<div class="post-media"><img src="${post.url}"></div>`;
                } else if (post.type === "video") {
                    mediaHtml = `<div class="post-media"><video controls src="${post.url}"></video></div>`;
                } else if (post.type === "live") {
                    mediaHtml = `
                        <div class="live-screen">
                            <span class="live-tag">🔴 CANLI YAYIN</span>
                            <div style="font-size:48px;">📹</div>
                            <p style="margin-top:10px; font-weight:bold; font-size:14px;">nappag Canlı Medya Akışı Aktif</p>
                        </div>
                    `;
                }

                // Buton Kontrolleri: Admin veya Gönderi Sahibi Silebilir
                let actionButtons = "";
                if (post.authors.includes(sessionUser.username) || sessionUser.username === "admin") {
                    actionButtons += `<button onclick="removePost('${post.id}')" class="danger-btn">Sil</button> `;
                }

                // @admin Kullanıcısına Özel Ban Butonu
                if (sessionUser.username === "admin") {
                    post.authors.forEach(userKey => {
                        if (userKey !== "admin" && allUsers[userKey] && !allUsers[userKey].isBanned) {
                            actionButtons += `<button onclick="adminBanUser('${userKey}')" class="danger-btn" style="background:#b33939;">@${userKey} Banla</button>`;
                        }
                    });
                }

                // Yorumlar Listesi
                let commentsHtml = post.comments.map(c => `
                    <div style="font-size:13px; margin-bottom:6px; border-bottom:1px solid #1f1f1f; padding-bottom:4px;">
                        <strong style="color:var(--nappag-orange);">@${c.username}:</strong> ${c.text}
                    </div>
                `).join("");

                card.innerHTML = `
                    <div class="post-header">
                        <div class="author-info"><div>${authorsHtml}</div></div>
                        <div>${actionButtons}</div>
                    </div>
                    ${mediaHtml}
                    <div style="padding:15px;">
                        <p style="font-size:15px; margin-bottom:15px; line-height:1.4;">${post.description}</p>
                        <button onclick="likePost('${post.id}')" style="width:auto; padding:6px 12px; font-size:12px; background:#222; border:1px solid var(--border-color);">
                            ❤️ Beğen (${post.likes.length})
                        </button>
                        <div style="background:#0f0f0f; padding:12px; border-radius:10px; margin-top:15px;">
                            <div id="comments_area_${post.id}">${commentsHtml}</div>
                            <div style="display:flex; gap:10px; margin-top:10px;">
                                <input type="text" id="comment_input_${post.id}" placeholder="Yorum yaz..." style="margin-bottom:0; padding:8px;">
                                <button onclick="commentPost('${post.id}')" style="width:auto; padding:8px 15px; font-size:13px;">Gönder</button>
                            </div>
                        </div>
                    </div>
                `;
                feed.appendChild(card);
            });
        }

        // GÜVENLİ ÇIKIŞ
        function handleLogout() {
            sessionUser = null;
            document.getElementById("appScreen").style.display = "none";
            document.getElementById("authScreen").style.display = "block";
            document.getElementById("loginUsername").value = "";
            document.getElementById("loginPassword").value = "";
        }
    </script>
</body>
</html>
