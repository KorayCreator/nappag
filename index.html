<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nappag - Özgür Topluluk Ağı</title>
    <style>
        :root {
            --primary-color: #6c5ce7;
            --admin-color: #ff7675;
            --badge-color: #FF8C00;
            --bg-color: #f8f9fa;
            --dark-color: #2d3436;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--dark-color); padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        
        header { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 28px; font-weight: 900; color: var(--primary-color); letter-spacing: -1px; }
        .logo span { color: var(--badge-color); }
        
        .card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h3 { margin-bottom: 15px; font-size: 16px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
        .flex-group { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        
        input, textarea, select { width: 100%; padding: 12px; border: 2px solid #edf2f7; border-radius: 8px; font-size: 14px; background: #fdfdfd; transition: all 0.3s; }
        input:focus, textarea:focus, select:focus { outline: none; border-color: var(--primary-color); background: #white; }
        button { background: var(--primary-color); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        button.admin-btn { background: var(--admin-color); }

        /* Turuncu Kutu İçinde Beyaz Yıldız Rozeti */
        .star-badge {
            background-color: var(--badge-color);
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 11px;
            margin-left: 6px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 4px rgba(255, 140, 0, 0.3);
        }

        .post { background: white; padding: 20px; border-radius: 15px; margin-bottom: 15px; border-left: 6px solid var(--primary-color); box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .post.admin-post { border-left-color: var(--admin-color); }
        .post-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .authors { font-weight: bold; color: var(--dark-color); display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
        .nickname { font-size: 12px; color: #a0aec0; background: #edf2f7; padding: 2px 6px; border-radius: 4px; margin-left: 4px; }
        .post-content img, .post-content video { max-width: 100%; border-radius: 10px; margin-top: 12px; max-height: 400px; width: 100%; object-fit: cover; }
        
        .comments-section { margin-top: 15px; background: #f8f9fa; padding: 15px; border-radius: 10px; }
        .comment { font-size: 13px; padding: 8px 0; border-bottom: 1px solid #edf2f7; }
        .comment:last-child { border-bottom: none; }

        .live-indicator { background: #ff7675; color: white; padding: 3px 8px; border-radius: 5px; font-size: 11px; font-weight: bold; animation: blink 1s infinite; display: inline-block; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.4;} 100% {opacity: 1;} }
        
        .banned-msg { color: var(--admin-color); font-weight: bold; text-align: center; padding: 30px; border: 2px dashed var(--admin-color); }
    </style>
</head>
<body>

<div class="container">
    <!-- nappag Üst Menü -->
    <header>
        <div class="logo">nappag<span>.</span></div>
        <div>
            <label style="font-size: 11px; font-weight: bold; color: #718096; display: block; margin-bottom: 4px;">Kullanıcı Simülasyonu:</label>
            <select id="currentUserSelect" onchange="switchUser(this.value)" style="width: auto; padding: 6px 12px;">
                <option value="user1">Can (150 Takipçi - ⭐ Rozetli)</option>
                <option value="user2">Merve (30 Takipçi)</option>
                <option value="user3">Arda (Ortak Yazar)</option>
                <option value="admin">@admin (Sistem Sahibi)</option>
            </select>
        </div>
    </header>

    <!-- Profil Bilgileri / Lakap Sistemi -->
    <div class="card" id="profileCard">
        <h3>nappag Profil Ayarları</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
            <div>
                <label style="font-size: 12px; color: #718096;">Topluluk İçi Lakap:</label>
                <input type="text" id="profNickname" placeholder="Örn: KahveSever">
            </div>
            <div>
                <label style="font-size: 12px; color: #718096;">Profil Açıklaması:</label>
                <input type="text" id="profBio" placeholder="Kendinden bahset...">
            </div>
        </div>
        <button onclick="updateProfile()" style="margin-top: 15px; width: 100%;">Değişiklikleri Kaydet</button>
    </div>

    <!-- Gönderi ve Canlı Yayın Paylaşma -->
    <div class="card" id="publishCard">
        <h3>nappag'da Paylaş</h3>
        <div class="flex-group" style="margin-top: 10px;">
            <select id="postType" onchange="toggleMediaInput()">
                <option value="photo">🖼️ Fotoğraf Yükle</option>
                <option value="video">🎥 Video Yükle</option>
                <option value="live">🔴 Canlı Yayın Başlat</option>
            </select>
            <select id="coAuthor">
                <option value="">🤝 Ortak Gönderi (Yazar Seç)</option>
                <option value="user2">Merve</option>
                <option value="user3">Arda</option>
            </select>
        </div>
        <input type="text" id="mediaUrl" placeholder="Görsel URL'si (örn: https://picsum.photos/600/400)" style="margin-bottom: 10px;">
        <textarea id="postDesc" placeholder="Neler oluyor? (Küfürler filtrelenir...)" rows="2"></textarea>
        <button onclick="createPost()" style="margin-top: 10px; width: 100%;">Gönderiyi Yayınla</button>
    </div>

    <!-- Akış (Feed) -->
    <div id="feed"></div>
</div>

<script>
    // Güvenlik Koruması: Küfür Filtre Listesi
    const KUFUR_FILTRESI = ["küfür1", "küfür2", "salak", "aptal", "mal"]; 

    // Veri Yapısı (Local State)
    let users = {
        user1: { username: "can", nickname: "Gezgin", followers: 150, bio: "nappag kaşifi", isBanned: false },
        user2: { username: "merve", nickname: "SiberMimar", followers: 30, bio: "Tasarım ve kod", isBanned: false },
        user3: { username: "arda", nickname: "PixelArt", followers: 85, bio: "Çizim dünyası", isBanned: false },
        admin: { username: "admin", nickname: "Kurucu", followers: 99999, bio: "nappag Resmi Admin Hesabı", isBanned: false }
    };

    let posts = [
        {
            id: 1,
            authors: ["user1", "user3"], // Ortak Gönderi Örneği
            type: "photo",
            url: "https://picsum.photos/id/1015/600/400",
            desc: "Arda ile beraber nappag için tasarladığımız ilk topluluk görseli!",
            likes: [],
            comments: [{ username: "merve", text: "Harika görünüyor, topluluğa hoş geldiniz!" }]
        }
    ];

    let currentUserId = "user1";

    // Filtreleme Algoritması
    function filtrele(metin) {
        let temizMetin = metin;
        KUFUR_FILTRESI.forEach(kufur => {
            let regex = new RegExp(kufur, "gi");
            temizMetin = temizMetin.replace(regex, "***");
        });
        return temizMetin;
    }

    // Kullanıcı Değiştirici
    function switchUser(userId) {
        currentUserId = userId;
        document.getElementById("profNickname").value = users[currentUserId].nickname;
        document.getElementById("profBio").value = users[currentUserId].bio;
        renderFeed();
    }

    // Profil Yönetimi (Admin İsmi Koruma Güvenliği)
    function updateProfile() {
        let yeniLakap = document.getElementById("profNickname").value;
        
        // HACK/SPOOF ENGELİ: Admin ismi manipülasyonu engelleme
        if(yeniLakap.toLowerCase().includes("admin") && currentUserId !== 'admin') {
            alert("Sistem Güvenliği: '@admin' ismi veya türevleri taklit edilemez!");
            return;
        }
        
        users[currentUserId].nickname = filtrele(yeniLakap);
        users[currentUserId].bio = filtrele(document.getElementById("profBio").value);
        alert("nappag profiliniz güncellendi!");
        renderFeed();
    }

    function toggleMediaInput() {
        let type = document.getElementById("postType").value;
        let mediaUrlInput = document.getElementById("mediaUrl");
        if(type === "live") {
            mediaUrlInput.style.display = "none";
            document.getElementById("postDesc").placeholder = "Canlı yayın açıklaması girin...";
        } else {
            mediaUrlInput.style.display = "block";
            mediaUrlInput.placeholder = type === "photo" ? "Fotoğraf URL'si girin" : "Video URL'si (.mp4) girin";
        }
    }

    // Gönderi Paylaşma
    function createPost() {
        if(users[currentUserId].isBanned) return;

        let type = document.getElementById("postType").value;
        let url = document.getElementById("mediaUrl").value || "https://picsum.photos/id/1043/600/400";
        let desc = document.getElementById("postDesc").value;
        let coAuthor = document.getElementById("coAuthor").value;

        let authors = [currentUserId];
        if(coAuthor) authors.push(coAuthor); // Ortak Gönderi Bağlantısı

        posts.unshift({
            id: Date.now(),
            authors: authors,
            type: type,
            url: type === "live" ? "" : url,
            desc: filtrele(desc),
            likes: [],
            comments: []
        });

        document.getElementById("postDesc").value = "";
        renderFeed();
    }

    // Gönderi Silme Sistemi
    function deletePost(postId) {
        let postIndex = posts.findIndex(p => p.id === postId);
        let post = posts[postIndex];

        // Yetki Kontrolü: Kişi kendi gönderisini silebilir, @admin ise HER ŞEYİ silebilir.
        if(currentUserId === 'admin' || post.authors.includes(currentUserId)) {
            posts.splice(postIndex, 1);
            renderFeed();
        } else {
            alert("Güvenlik Hatası: Bu içeriği silmeye yetkiniz yok.");
        }
    }

    // Özel @admin Ban Yetkisi
    function banUser(userId) {
        if(currentUserId !== 'admin') {
            alert("Bu işlem sadece @admin yetkisindedir!");
            return;
        }
        users[userId].isBanned = true;
        alert(`Kullanıcı banlandı ve nappag sisteminden uzaklaştırıldı.`);
        renderFeed();
    }

    function likePost(postId) {
        let post = posts.find(p => p.id === postId);
        if(!post.likes.includes(currentUserId)) {
            post.likes.push(currentUserId);
        } else {
            post.likes = post.likes.filter(id => id !== currentUserId);
        }
        renderFeed();
    }

    function addComment(postId, text) {
        if(!text.trim()) return;
        let post = posts.find(p => p.id === postId);
        post.comments.push({
            username: users[currentUserId].username,
            text: filtrele(text)
        });
        renderFeed();
    }

    // Arayüz Çizimi (Render Engine)
    function renderFeed() {
        let feed = document.getElementById("feed");
        feed.innerHTML = "";

        // Ban Kontrolü
        if(users[currentUserId].isBanned) {
            feed.innerHTML = "<div class='card banned-msg'>🚨 Hesabınız Kurallara Uymadığı İçin @admin Tarafından Engellenmiştir.</div>";
            document.getElementById("publishCard").style.display = "none";
            document.getElementById("profileCard").style.display = "none";
            return;
        } else {
            document.getElementById("publishCard").style.display = "block";
            document.getElementById("profileCard").style.display = "block";
        }

        posts.forEach(post => {
            let postEl = document.createElement("div");
            postEl.className = `post ${post.authors.includes('admin') ? 'admin-post' : ''}`;

            // Yazarlar, Lakaplar ve Turuncu Kutu Rozeti Algoritması
            let authorsHtml = post.authors.map(authId => {
                let u = users[authId];
                // 100 Takipçi Şartı: Turuncu Kutu İçinde Beyaz Yıldız
                let badge = u.followers > 100 ? `<span class="star-badge" title="Popüler nappag Üyesi">★</span>` : '';
                let nicknameHtml = u.nickname ? `<span class="nickname">${u.nickname}</span>` : '';
                return `<span><strong>@${u.username}</strong>${nicknameHtml}${badge}</span>`;
            }).join(" <span style='color:#a0aec0; margin:0 5px;'>ve</span> ");

            // İçerik Türü Filtreleme
            let mediaHtml = "";
            if(post.type === "photo") {
                mediaHtml = `<div class="post-content"><img src="${post.url}" alt="nappag"></div>`;
            } else if(post.type === "video") {
                mediaHtml = `<div class="post-content"><video controls src="${post.url}"></video></div>`;
            } else if(post.type === "live") {
                mediaHtml = `<div class="post-content" style="background:#1e272e; color:#fff; padding:50px 20px; text-align:center; border-radius:12px; margin-top:12px; border: 2px solid #ff7675;">
                                <span class="live-indicator">🔴 CANLI YAYIN</span><br><br style="margin-bottom:10px;">nappag Canlı Yayın Medya Akışı Başlatıldı...
                             </div>`;
            }

            // Moderasyon Butonları
            let actionButtons = "";
            if(post.authors.includes(currentUserId) || currentUserId === 'admin') {
                actionButtons += `<button onclick="deletePost(${post.id})" class="admin-btn" style="padding:5px 10px; font-size:12px;">Gönderiyi Sil</button>`;
            }
            
            // @admin Kullanıcısına Özel Ban Butonları
            if(currentUserId === 'admin') {
                post.authors.forEach(authId => {
                    if(authId !== 'admin' && !users[authId].isBanned) {
                        actionButtons += ` <button onclick="banUser('${authId}')" class="admin-btn" style="padding:5px 10px; font-size:12px; background:#d63031;">@${users[authId].username} Kullanıcısını Banla</button>`;
                    }
                });
            }

            let commentsHtml = post.comments.map(c => `
                <div class="comment"><strong>@${c.username}:</strong> ${c.text}</div>
            `).join("");

            postEl.innerHTML = `
                <div class="post-header">
                    <div class="authors">${authorsHtml}</div>
                    <div>${actionButtons}</div>
                </div>
                <p style="font-size: 15px; line-height: 1.5;">${post.desc}</p>
                ${mediaHtml}
                <div style="margin-top:15px;">
                    <button onclick="likePost(${post.id})" style="background:#f1f2f6; color:#2d3436; font-size:13px; padding:8px 14px;">
                        ❤️ Beğen (${post.likes.length})
                    </button>
                </div>
                <div class="comments-section">
                    ${commentsHtml}
                    <div class="flex-group" style="margin-top:10px;">
                        <input type="text" placeholder="Yorum ekle..." id="comment_input_${post.id}">
                        <button onclick="addComment(${post.id}, document.getElementById('comment_input_${post.id}').value)" style="padding:8px 15px; font-size:13px;">Yorumla</button>
                    </div>
                </div>
            `;
            feed.appendChild(postEl);
        });
    }

    // Başlangıç Ayarı
    switchUser("user1");
</script>

</body>
</html>
