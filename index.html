<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerçekçi AI Karakter Stüdyosu v2</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0c10;
            color: #66fcf1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 95%;
            max-width: 1100px;
            background: #1f2833;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(102, 252, 241, 0.2);
            text-align: center;
        }
        h1 {
            color: #66fcf1;
            margin-bottom: 10px;
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        p { color: #c5c6c7; margin-bottom: 25px; }
        .iframe-wrapper {
            position: relative;
            width: 100%;
            height: 800px;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid #45f3ff;
            background: #111;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>AI Sinematik Karakter Motoru v2</h1>
    <p>Aktif ve çalışan yapay zeka sunucusuna bağlanıldı. Fotoğrafını yükle ve karakteri canlandır!</p>
    
    <div class="iframe-wrapper">
        <iframe src="https://fffiloni-sadtalker.hf.space" allow="microphone; camera"></iframe>
    </div>
</div>

</body>
</html>
