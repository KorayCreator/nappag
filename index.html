<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Ücretsiz Yapay Zeka Platformu</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #131314;
            color: #e3e3e3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            margin-bottom: 30px;
            font-weight: 400;
            color: #ffffff;
        }

        /* GEMINI BUTONU */
        .gemini-btn {
            background: linear-gradient(45deg, #1a73e8, #681da8); /* Gemini'nin modern geçiş renkleri */
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
        }

        .gemini-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(104, 29, 168, 0.6);
        }

        /* Orijinal Dört Köşeli Gemini Yıldız Logosu */
        .gemini-logo {
            width: 24px;
            height: 24px;
            fill: #fff;
        }

        /* Sohbet Penceresi */
        #chat-window {
            margin-top: 25px;
            width: 90%;
            max-width: 450px;
            background-color: #1e1e20;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            display: none; /* İlk başta gizli */
            overflow: hidden;
            border: 1px solid #3c4043;
        }

        #chat-box {
            height: 250px;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-size: 14px;
        }

        .msg {
            padding: 10px 14px;
            border-radius: 18px;
            max-width: 75%;
            line-height: 1.4;
        }

        .user-msg {
            background-color: #007bff;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .gemini-msg {
            background-color: #303134;
            color: #e3e3e3;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .input-area {
            display: flex;
            padding: 10px;
            background-color: #131314;
            border-top: 1px solid #3c4043;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 25px;
            border: 1px solid #3c4043;
            background-color: #202124;
            color: white;
            outline: none;
            padding-left: 15px;
        }

        .send-btn {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 0 15px;
            margin-left: 8px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Yapay Zeka Platformu</h1>

    <button class="gemini-btn" onclick="sohbetiBaslat()">
        <svg class="gemini-logo" viewBox="0 0 24 24">
            <path d="M12 2c-.3 0-.6.2-.7.5l-2 5.3-5.3 2c-.3.1-.5.4-.5.7s.2.6.5.7l5.3 2 2 5.3c.1.3.4.5.7.5s.6-.2.7-.5l2-5.3 5.3-2c.3-.1.5-.4.5-.7s-.2-.6-.5-.7l-5.3-2-2-5.3c-.1-.3-.4-.5-.7-.5z"/>
        </svg>
        Gem
