<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eksiksiz Kutsal Kitaplar Kütüphanesi</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
            color: #333;
        }

        header {
            background-color: #1a252f;
            color: white;
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        h1 { margin: 0; font-size: 26px; }

        #translate_area {
            margin-top: 15px;
            padding: 5px;
            background: #2c3e50;
            display: inline-block;
            border-radius: 4px;
        }

        .container {
            max-width: 1100px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .book-nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .nav-btn {
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            transition: all 0.3s;
            color: white;
        }

        #btn-torah { background-color: #d35400; }
        #btn-bible { background-color: #2980b9; }
        #btn-quran { background-color: #27ae60; }

        .nav-btn:hover { opacity: 0.8; transform: translateY(-2px); }

        .book-content {
            background: white;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            min-height: 400px;
        }

        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        select, input {
            padding: 8px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .verse-container {
            margin-top: 20px;
            font-size: 18px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .verse-line {
            margin-bottom: 15px;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 4px;
        }
        
        .loading { font-style: italic; color: #7f8c8d; }
    </style>
</head>
<body>

    <header>
        <h1>Kutsal Kitaplar Evrensel Kütüphanesi</h1>
        <div id="translate_area">
            <div id="google_translate_element"></div>
        </div>
    </header>

    <div class="container">
        <div class="book-nav">
            <button id="btn-torah" class="nav-btn" onclick="loadBook('torah')">Tevrat (Eski Ahit)</button>
            <button id="btn-bible" class="nav-btn" onclick="loadBook('bible')">İncil (Yeni Ahit)</button>
            <button id="btn-quran" class="nav-btn" onclick="loadBook('quran')">Kur'an-ı Kerim</button>
        </div>

        <div class="book-content">
            <h2 id="library-title">Lütfen okumak istediğiniz kitabı seçin</h2>
            
            <div id="selector-area" class="controls" style="display: none;">
                <label id="select-label-1" for="select-1">Bölüm/Sure:</label>
                <select id="select-1" onchange="fetchVerses()"></select>
            </div>

            <div id="output" class="verse-container">
                <p>Yukarıdaki butonları kullanarak kitaplar arasında geçiş yapabilir, sağ üstteki menüden tüm sistemi istediğiniz dile çevirebilirsiniz.</p>
            </div>
        </div>
    </div>

    <script>
        let currentBook = '';

        // Kitapların API yapılandırmaları ve bölümleri
        const config = {
            quran: {
                title: "Kur'an-ı Kerim",
                chapters: 114, // 114 Sure
                label: "Sure Seçin:",
                url: (id) => `https://api.alquran.cloud/v1/surah/${id}/tr.diyanet`
            },
            bible: {
                title: "İncil (Yeni Ahit - Matta)",
                chapters: 28, // Matta Bölümleri Örneği (API sınırları için kararlı sürüm)
                label: "Bölüm Seçin:",
                url: (id) => `https://bible-api.com/matthew+${id}?translation=almeida` // Evrensel altyapı
            },
            torah: {
                title: "Tevrat (Yaratılış / Genesis)",
                chapters: 50, // Yaratılış Bölümü
                label: "Bab/Bölüm Seçin:",
                url: (id) => `https://bible-api.com/genesis+${id}`
            }
        };

        function loadBook(bookKey) {
            currentBook = bookKey;
            const book = config[bookKey];
            
            document.getElementById('library-title').innerText = book.title;
            document.getElementById('select-label-1').innerText = book.label;
            
            const select = document.getElementById('select-1');
            select.innerHTML = '';
            
            // Bölüm listesini doldur
            for(let i = 1; i <= book.chapters; i++) {
                let option = document.createElement('option');
                option.value = i;
                option.text = `${bookKey === 'quran' ? i + '. Sure' : i + '. Bölüm'}`;
                select.appendChild(option);
            }
            
            document.getElementById('selector-area').style.display = 'flex';
            fetchVerses();
        }

        async function fetchVerses() {
            const id = document.getElementById('select-1').value;
            const output = document.getElementById('output');
            output.innerHTML = '<p class="loading">Kitap verileri yükleniyor, lütfen bekleyin...</p>';
            
            try {
                const response = await fetch(config[currentBook].url(id));
                const data = await response.json();
                output.innerHTML = ''; // Yükleniyor yazısını kaldır
                
                if (currentBook === 'quran') {
                    // Kur'an API yapısı işleme
                    data.data.ayahs.forEach(ayah => {
                        output.innerHTML += `<div class="verse-line"><b>${ayah.numberInSurah}.</b> ${ayah.text}</div>`;
                    });
                } else {
                    // Tevrat ve İncil API yapısı işleme
                    data.verses.forEach(verse => {
                        output.innerHTML += `<div class="verse-line"><b>${verse.verse}.</b> ${verse.text}</div>`;
                    });
                }
            } catch (error) {
                output.innerHTML = '<p style="color:red;">Veri yüklenirken bir hata oluştu. Lütfen internet bağlantınızı kontrol edin.</p>';
            }
        }
    </script>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'tr', 
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
