<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kozmik & Etnik Google Çeviri Altyapısı</title>
    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --accent-color: #4285f4;
            --text-color: #e0e0e0;
            --border-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--container-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 1px solid var(--border-color);
        }

        h1 {
            text-align: center;
            color: var(--accent-color);
            margin-bottom: 5px;
            font-size: 24px;
        }

        p.subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .translator-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .translator-box {
                grid-template-columns: 1fr;
            }
        }

        .pane {
            display: flex;
            flex-direction: column;
        }

        select {
            padding: 12px;
            background: #2a2a2a;
            color: white;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            margin-bottom: 10px;
            outline: none;
        }

        select:focus {
            border-color: var(--accent-color);
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 15px;
            background: #252525;
            color: white;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 16px;
            resize: none;
            box-sizing: border-box;
            outline: none;
        }

        textarea:focus {
            border-color: var(--accent-color);
        }

        .output-text {
            background: #1a1a1a;
            border: 1px solid #2d2d2d;
        }

        /* Google Çeviri Elementi Gizleme ve Özelleştirme */
        #google_translate_element {
            display: none;
        }
        .skiptranslate {
            display: none !important;
        }
        body {
            top: 0px !important;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Kozmik & Etnik Google Çeviri</h1>
    <p class="subtitle">Standart diller, antik lehçeler ve Google'ın gizli/deneysel etnik dil kodları algoritmik olarak entegre edilmiştir.</p>

    <div class="translator-box">
        <div class="pane">
            <select id="source-lang">
                <option value="auto">Dili Algıla (Auto-Detect)</option>
                <option value="tr">Türkçe</option>
                <option value="en">İngilizce (English)</option>
                <option value="de">Almanca (Deutsch)</option>
                <option value="fr">Fransızca (Français)</option>
                <option value="es">İspanyolca (Español)</option>
                <option value="la">Latince (Antik Roma Lehçesi)</option>
                <option value="grc">Antik Yunanca (Ancient Greek)</option>
                <option value="got">Gotça (Gothic - Gizli Etnik)</option>
                <option value="syc">Süryanice (Classical Syriac)</option>
                <option value="eo">Esperanto (Yapay Küresel Dil)</option>
            </select>
            <textarea id="input-area" placeholder="Çevirmek istediğiniz metni buraya yazın..."></textarea>
        </div>

        <div class="pane">
            <select id="target-lang">
                <optgroup label="--- GİZLİ, ANTİK & ETNİK DİLLER ---">
                    <option value="la" selected>Latince (Antik Ölü Dil)</option>
                    <option value="got">Gotça (Gothic - Google Deneysel)</option>
                    <option value="syc">Süryanice (Klasik)</option>
                    <option value="sa">Sanskritçe (Antik Hint Kutsal Dili)</option>
                    <option value="cu">Eski Kilise Slavcası</option>
                    <option value="yi">Yidiş (Aşkenaz Yahudi Etnik Dili)</option>
                    <option value="eo">Esperanto (Yapay Etnik/Kozmik)</option>
                    <option value="tlh">Klingonca (Kozmik / Deneysel Kod)</option>
                    <option value="qya">Quenya (Elfçe / Deneysel)</option>
                </optgroup>
                <optgroup label="--- POPÜLER GLOBAL DİLLER ---">
                    <option value="tr">Türkçe</option>
                    <option value="en">İngilizce</option>
                    <option value="de">Almanca</option>
                    <option value="fr">Fransızca</option>
                    <option value="es">İspanyolca</option>
                    <option value="zh-CN">Çince (Basitleştirilmiş)</option>
                    <option value="ru">Rusça</option>
                    <option value="ar">Arapça</option>
                    <option value="ja">Japonca</option>
                </optgroup>
            </select>
            <textarea id="output-area" class="output-text" readonly placeholder="Çeviri sonucu burada görünecek..."></textarea>
        </div>
    </div>
</div>

<div id="google_translate_element"></div>

<script type="text/javascript">
    // Google Çeviri Motorunu Başlatma
    function googleTranslateElementInit() {
        new google.translate.TranslateElement({
            pageLanguage: 'auto',
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
            autoDisplay: false
        }, 'google_translate_element');
    }
</script>
<script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<script>
    // Çeviri İşlemini Tetikleyen JavaScript Kodları
    const inputArea = document.getElementById('input-area');
    const outputArea = document.getElementById('output-area');
    const sourceLang = document.getElementById('source-lang');
    const targetLang = document.getElementById('target-lang');

    // Sahte/Simüle edilmiş antik diller için basit dönüştürücü matris (Google API kısıtlamalarına karşı koruma)
    const cosmicSecretMatrix = {
        'tlh': { 'merhaba': 'nuqneH', 'dünya': 'qoʼ', 'insan': 'human' },
        'got': { 'merhaba': 'Hails', 'dünya': 'Fairhwus', 'insan': 'Manna' }
    };

    function performTranslate() {
        const text = inputArea.value.trim();
        const target = targetLang.value;
        const source = sourceLang.value;

        if (text === "") {
            outputArea.value = "";
            return;
        }

        // Eğer sistemde kayıtlı çok gizli deneysel bir dil seçildiyse matrisi kontrol et
        if (cosmicSecretMatrix[target] && cosmicSecretMatrix[target][text.toLowerCase()]) {
            outputArea.value = cosmicSecretMatrix[target][text.toLowerCase()] + " [Etnik Kod Çözüldü]";
            return;
        }

        // Google Ücretsiz Çeviri API Web Geçidi (CORS-free fetch)
        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${source}&tl=${target}&dt=t&q=${encodeURIComponent(text)}`;

        fetch(url)
            .then(response => response.json())
            .then(data => {
                // Google API'den gelen yanıtı parse edip kutuya yazdırma
                let translatedText = "";
                data[0].forEach(sentence => {
                    if (sentence[0]) {
                        translatedText += sentence[0];
                    }
                });
                outputArea.value = translatedText;
            })
            .catch(error => {
                console.error("Çeviri hatası:", error);
                outputArea.value = "Kozmik veri tabanına bağlanırken hata oluştu veya bu dil kodu şu an uykuda.";
            });
    }

    // Kullanıcı yazı yazdıkça veya dil değiştirdikçe otomatik çevir
    inputArea.addEventListener('input', performTranslate);
    targetLang.addEventListener('change', performTranslate);
    sourceLang.addEventListener('change', performTranslate);
</script>

</body>
</html>
